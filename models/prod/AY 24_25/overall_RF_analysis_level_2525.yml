version: 2
models:
- name: overall_RF_analysis_level_2525
  description: City-grade summary of student counts by reading fluency status band
    across baseline, midline, and endline. Despite the file name, the bucket field
    in this model is `rf_status`, not a separate numeric level.
  columns:
  - name: city
    description: City for the reporting row.
  - name: grade
    description: Grade for the reporting row.
  - name: rf_status
    description: Reading fluency status band for this row. Observed values in the
      warehouse include Advanced, Beginner, Developing, Emergent, and Not Assessed.
  - name: student_count_base
    description: Number of distinct baseline students in this city-grade-reading fluency
      status bucket.
  - name: student_count_mid
    description: Number of distinct midline students in this city-grade-reading fluency
      status bucket.
  - name: student_count_end
    description: Number of distinct endline students in this city-grade-reading fluency
      status bucket.
