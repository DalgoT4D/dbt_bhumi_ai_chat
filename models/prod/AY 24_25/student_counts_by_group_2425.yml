version: 2
models:
- name: student_counts_by_group_2425
  description: Student roster counts by city, school, fellow, and grade across baseline,
    midline, and endline. Each round count is the number of distinct students with
    the corresponding round attendance flag set to true.
  columns:
  - name: city
    description: City for the reporting row.
  - name: school
    description: School for the reporting row.
  - name: fellow
    description: Fellow for the reporting row.
  - name: grade
    description: Grade for the reporting row.
  - name: baseline_count
    description: Number of distinct students with `baseline_attendence` = true in
      this city-school-fellow-grade group.
  - name: midline_count
    description: Number of distinct students with `midline_attendence` = true in this
      city-school-fellow-grade group.
  - name: endline_count
    description: Number of distinct students with `endline_attendence` = true in this
      city-school-fellow-grade group.
