version: 2
models:
- name: base_mid_end_comb_scores_2425_fct
  description: Student-level assessment fact table for AY 2024-25 that aligns baseline,
    midline, and endline reading comprehension, reading fluency, and math metrics
    to a shared `student_id`. This is the main score spine used by the reporting layer,
    carrying round-specific statuses, levels, percentages, domain scores, and subskill
    scores for each student.
  columns:
  - name: student_id
    description: Shared student identifier used to align baseline, midline, and endline
      metrics for the same student.
  - name: rc_level_base
    description: Baseline reading comprehension level from the source assessment sheet.
      Observed values in the warehouse include numeric steps such as 0, 0.2, 0.5,
      1, 1.5, 2, and 2.5, plus Emergent and Not Assessed.
  - name: rc_grade_level_base
    description: Baseline reading comprehension grade-level field from the source
      assessment sheet.
  - name: rc_status_base
    description: Baseline reading comprehension status band from the source assessment
      sheet. Observed values include Below Grade Level, At Grade Level, and Above
      Grade Level.
  - name: rc_assessed_perc_base
    description: Baseline value from the source `RC_Assessed___` field, carried through
      as the sheet's assessed percentage or score value.
  - name: rc_level_mid
    description: Midline reading comprehension level from the source assessment sheet.
      Observed values in the warehouse include numeric steps such as 0, 0.2, 0.5,
      1, 1.5, 2, and 2.5, plus Emergent and Not Assessed.
  - name: rc_grade_level_mid
    description: Midline reading comprehension grade-level field from the source assessment
      sheet.
  - name: rc_status_mid
    description: Midline reading comprehension status band from the source assessment
      sheet. Observed values include Below Grade Level, At Grade Level, and Above
      Grade Level.
  - name: rc_assessed_perc_mid
    description: Midline value from the source `RC_Assessed___` field, carried through
      as the sheet's assessed percentage or score value.
  - name: rc_level_end
    description: Endline reading comprehension level from the source assessment sheet.
      Observed values in the warehouse include numeric steps such as 0, 0.2, 0.5,
      1, 1.5, 2, and 2.5, plus Emergent and Not Assessed.
  - name: rc_grade_level_end
    description: Endline reading comprehension grade-level field from the source assessment
      sheet.
  - name: rc_status_end
    description: Endline reading comprehension status band from the source assessment
      sheet. Observed values include Below Grade Level, At Grade Level, and Above
      Grade Level.
  - name: rc_assessed_perc_end
    description: Endline value from the source `RC_Assessed___` field, carried through
      as the sheet's assessed percentage or score value.
  - name: rf_status_base
    description: Baseline reading fluency status band from the source assessment sheet.
      Observed values include Advanced, Beginner, Developing, Emergent, and Not Assessed.
  - name: rf_perc_base
    description: Baseline student-level reading fluency percentage score.
  - name: rf_code_base
    description: Baseline reading fluency code from the source assessment sheet. Observed
      values include 0 through 5.
  - name: rf_status_mid
    description: Midline reading fluency status band from the source assessment sheet.
      Observed values include Advanced, Beginner, Developing, Emergent, and Not Assessed.
  - name: rf_perc_mid
    description: Midline student-level reading fluency percentage score.
  - name: rf_code_mid
    description: Midline reading fluency code from the source assessment sheet. Observed
      values include 0 through 5.
  - name: rf_status_end
    description: Endline reading fluency status band from the source assessment sheet.
      Observed values include Advanced, Beginner, Developing, Emergent, and Not Assessed.
  - name: rf_perc_end
    description: Endline student-level reading fluency percentage score.
  - name: rf_code_end
    description: Endline reading fluency code from the source assessment sheet. Observed
      values include 0 through 5.
  - name: math_level_base
    description: Baseline math level bucket from the source assessment sheet. Observed
